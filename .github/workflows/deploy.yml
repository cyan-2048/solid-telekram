name: deploy-preview
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  deploy-preview:
    name: deploy-preview
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      # run any `bun` or `bunx` command
      - run: bun install --frozen-lockfile
      - run: bun run deploy:preview